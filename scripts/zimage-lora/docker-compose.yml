services:
  simpletuner:
    image: ${ZLORA_IMAGE_NAME:-photopainter-simpletuner:local}
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PYTHON_VERSION: ${ZLORA_PYTHON_VERSION:-3.12}
        SIMPLETUNER_BRANCH: ${SIMPLETUNER_BRANCH:-release}
    gpus: all
    shm_size: ${ZLORA_SHM_SIZE:-16gb}
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      HF_HOME: /workspace/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${ZLORA_WORK_ROOT:?set ZLORA_WORK_ROOT}:/workspace
    command: ["bash", "-lc", "tail -f /dev/null"]

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: photopainter-server
    ports:
      - "0.0.0.0:${SERVER_EXPOSE_PORT:-8000}:8000"
    volumes:
      - ${SERVER_CONTENT_DIR:-./server/contents}:/app/contents
    environment:
      - PORT=8000
      - CONTENT_DIR=/app/contents
      - TZ=Asia/Tokyo
    restart: unless-stopped
    networks:
      - photopainter

  comfyui:
    build:
      context: ./comfyui
      dockerfile: runpod/Dockerfile
      args:
        COMFYUI_CUSTOM_NODES: ${COMFYUI_CUSTOM_NODES:-https://github.com/yolain/ComfyUI-Easy-Use,https://github.com/stavsap/comfyui-ollama,https://github.com/StableLlama/ComfyUI-basic_data_handling}
    container_name: photopainter-comfyui
    ports:
      - "0.0.0.0:${COMFYUI_PORT:-18188}:8188"
    volumes:
      # local でも RunPod と同じ /runpod-volume 前提で起動する
      - ${RUNPOD_VOLUME_DIR:-./runpod-volume}:/runpod-volume
      - ${RUNPOD_VOLUME_DIR:-./runpod-volume}/models:/comfyui/models
      - ${RUNPOD_VOLUME_DIR:-./runpod-volume}/output:/comfyui/output
      - ${RUNPOD_VOLUME_DIR:-./runpod-volume}/input:/comfyui/input
      - ${RUNPOD_VOLUME_DIR:-./runpod-volume}/user:/comfyui/user
      - ${RUNPOD_VOLUME_DIR:-./runpod-volume}/dot-cache:/root/.cache
      - ${RUNPOD_VOLUME_DIR:-./runpod-volume}/dot-local:/root/.local
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    gpus: all
    environment:
      - TZ=Asia/Tokyo
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CLI_ARGS=${COMFYUI_CLI_ARGS:---listen 0.0.0.0 --fast --enable-manager}
      - COMFYUI_LLM_MODEL_CACHE_DIR=${COMFYUI_LLM_MODEL_CACHE_DIR:-}
      - LOCAL_COMFYUI_ONLY=true
      - OLLAMA_PULL_MODELS=${OLLAMA_PULL_MODELS:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - photopainter

  ai-toolkit:
    image: ostris/aitoolkit:latest
    container_name: photopainter-ai-toolkit
    ports:
      - "0.0.0.0:${AI_TOOLKIT_PORT:-8675}:8675"
    volumes:
      - ${AI_TOOLKIT_DATA_DIR:-./ai-toolkit-data}/cache/huggingface:/root/.cache/huggingface/hub
      - ${AI_TOOLKIT_DATA_DIR:-./ai-toolkit-data}/db:/app/ai-toolkit/db
      - ${AI_TOOLKIT_DATA_DIR:-./ai-toolkit-data}/datasets:/app/ai-toolkit/datasets
      - ${AI_TOOLKIT_DATA_DIR:-./ai-toolkit-data}/output:/app/ai-toolkit/output
      - ${AI_TOOLKIT_DATA_DIR:-./ai-toolkit-data}/config:/app/ai-toolkit/config
    environment:
      - TZ=Asia/Tokyo
      - AI_TOOLKIT_AUTH=${AI_TOOLKIT_AUTH:-password}
      - AI_TOOLKIT_DB=/app/ai-toolkit/db/aitk_db.db
      - NODE_ENV=production
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - photopainter
    shm_size: "8gb"

networks:
  photopainter:
    driver: bridge

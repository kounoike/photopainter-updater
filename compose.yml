services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: photopainter-server
    ports:
      - "0.0.0.0:${SERVER_EXPOSE_PORT:-8000}:8000"
    volumes:
      - ${SERVER_CONTENT_DIR:-./server/contents}:/app/contents
    environment:
      - PORT=8000
      - CONTENT_DIR=/app/contents
      - TZ=Asia/Tokyo
    restart: unless-stopped
    networks:
      - photopainter

  comfyui:
    build:
      context: ./comfyui
      dockerfile: Dockerfile
      args:
        COMFYUI_REF: ${COMFYUI_REF:-v0.9.2}
    container_name: photopainter-comfyui
    ports:
      - "0.0.0.0:${COMFYUI_PORT:-18188}:8188"
    volumes:
      # 必須: モデル・カスタムノード・uv/pip依存ライブラリ・生成画像
      - ${COMFYUI_DATA_DIR:-./comfyui-data}/models:/root/ComfyUI/models
      - ${COMFYUI_DATA_DIR:-./comfyui-data}/custom_nodes:/root/ComfyUI/custom_nodes
      - ./comfyui/custom_node/comfyui-photopainter-custom:/root/ComfyUI/custom_nodes/comfyui-photopainter-custom:ro
      - ${COMFYUI_DATA_DIR:-./comfyui-data}/dot-local:/root/.local
      - ${COMFYUI_DATA_DIR:-./comfyui-data}/output:/root/ComfyUI/output
      # 推奨: ユーザー設定・入力ファイル・ダウンロードキャッシュ
      - ${COMFYUI_DATA_DIR:-./comfyui-data}/user:/root/ComfyUI/user
      - ${COMFYUI_DATA_DIR:-./comfyui-data}/input:/root/ComfyUI/input
      - ${COMFYUI_DATA_DIR:-./comfyui-data}/dot-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    gpus: all
    environment:
      - TZ=Asia/Tokyo
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - MODEL_ROOT=${COMFYUI_MODEL_ROOT:-/root/ComfyUI/models}
      - CLI_ARGS=${COMFYUI_CLI_ARGS:---listen 0.0.0.0 --fast --enable-manager}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - photopainter
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    container_name: photopainter-ollama
    gpus: all
    volumes:
      - ${OLLAMA_DATA_DIR:-./ollama-data}:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    restart: unless-stopped
    networks:
      - photopainter

  ai-toolkit:
    image: ostris/aitoolkit:latest
    container_name: photopainter-ai-toolkit
    ports:
      - "0.0.0.0:${AI_TOOLKIT_PORT:-8675}:8675"
    volumes:
      - ${AI_TOOLKIT_DATA_DIR:-./ai-toolkit-data}/cache/huggingface:/root/.cache/huggingface/hub
      - ${AI_TOOLKIT_DATA_DIR:-./ai-toolkit-data}/db:/app/ai-toolkit/db
      - ${AI_TOOLKIT_DATA_DIR:-./ai-toolkit-data}/datasets:/app/ai-toolkit/datasets
      - ${AI_TOOLKIT_DATA_DIR:-./ai-toolkit-data}/output:/app/ai-toolkit/output
      - ${AI_TOOLKIT_DATA_DIR:-./ai-toolkit-data}/config:/app/ai-toolkit/config
    environment:
      - TZ=Asia/Tokyo
      - AI_TOOLKIT_AUTH=${AI_TOOLKIT_AUTH:-password}
      - AI_TOOLKIT_DB=/app/ai-toolkit/db/aitk_db.db
      - NODE_ENV=production
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - photopainter
    shm_size: "8gb"

networks:
  photopainter:
    driver: bridge

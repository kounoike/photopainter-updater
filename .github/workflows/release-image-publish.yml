name: Release Image Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  prepare-targets:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve enabled publish targets
        id: targets
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          import yaml

          release_version = "${{ github.event.release.tag_name }}"
          repository_owner = "${{ github.repository_owner }}"
          if not release_version:
              raise SystemExit("release tag_name is required")

          config = yaml.safe_load(Path(".github/release-image-publish.yml").read_text())
          registry = config.get("registry", "ghcr.io")
          targets = []
          for target in config.get("targets", []):
              if not target.get("enabled", False):
                  continue
              targets.append(
                  {
                      "name": target["name"],
                      "build_context": target["build_context"],
                      "dockerfile": target["dockerfile"],
                      "image": f"{registry}/{repository_owner}/{target['image_repository']}",
                      "image_title": target.get("default_labels", {}).get(
                          "org.opencontainers.image.title", target["name"]
                      ),
                  }
              )

          if not targets:
              raise SystemExit("no enabled publish targets found")

          print(f"targets={json.dumps(targets)}")
          PY

  publish-images:
    needs: prepare-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-targets.outputs.targets) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release version
        shell: bash
        run: |
          test -n "${{ github.event.release.tag_name }}"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
            org.opencontainers.image.title=${{ matrix.image_title }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.build_context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
